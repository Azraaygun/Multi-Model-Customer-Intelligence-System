<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Müşteri Düzenle</title>
    <style>
        body {
            font-family: Georgia, serif;
            background-color: #fff1de;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 60px;
        }
        h1 { color: #2c3e50; }
        form {
            background-color: #ffe8c9;
            border: 3px solid #fbaed2;
            border-radius: 10px;
            padding: 30px 40px;
            width: 350px;
        }
        label {
            display: block;
            margin-top: 15px;
            font-weight: bold;
            color: #34495e;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 5px;
            box-sizing: border-box;
        }
        button {
            margin-top: 20px;
            width: 100%;
            padding: 10px;
            background-color: #fbaed2;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>


  <div style="margin-bottom: 20px; text-align: center;">
        <a href="/dashboard">Dashboard</a> |
        <a href="/musteriler">Müşteri Listesi</a> |
        <a href="/musteri-ekle">Yeni Müşteri Ekle</a> |
        <a href="/tahmin">Müşteri Analizi</a> |
     <a href="/analitik">Metrikler</a> |
     <a href="/modeller">Model Seçimi</a> |
       <a href="/gecmis">Analiz Geçmişi</a>
    </div>

<body>
    <h1>Müşteri Düzenle</h1>

    <form method="POST">
        <label>Müşteri ID</label>
        <input type="text" value="{{ musteri.customerid }}" readonly>

        <label>İsim</label>
        <input type="text" name="name" value="{{ musteri.name }}" required>

        <label>Yaş</label>
        <input type="number" name="age" value="{{ musteri.age }}" required>

        <label>Cinsiyet</label>
        <select name="gender">
            <option value="Male" {% if musteri.gender == 'Male' %}selected{% endif %}>Male</option>
            <option value="Female" {% if musteri.gender == 'Female' %}selected{% endif %}>Female</option>
        </select>

        <label>Sözleşme Türü</label>
        <select name="contracttype">
            <option value="Month-to-month" {% if musteri.contracttype == 'Month-to-month' %}selected{% endif %}>Month-to-month</option>
            <option value="One year" {% if musteri.contracttype == 'One year' %}selected{% endif %}>One year</option>
            <option value="Two year" {% if musteri.contracttype == 'Two year' %}selected{% endif %}>Two year</option>
        </select>

        <label>Aylık Ücret</label>
        <input type="number" step="0.01" name="monthlycharge" value="{{ musteri.monthlycharge }}" required>

        <label>Üyelik Süresi (Ay)</label>
        <input type="number" name="tenure" value="{{ musteri.tenure }}" required>

        <label>İnternet Servisi</label>
        <select name="internetservice">
            <option value="DSL" {% if musteri.internetservice == 'DSL' %}selected{% endif %}>DSL</option>
            <option value="Fiber optic" {% if musteri.internetservice == 'Fiber optic' %}selected{% endif %}>Fiber optic</option>
            <option value="No" {% if musteri.internetservice == 'No' %}selected{% endif %}>No</option>
        </select>

        <label>Ödeme Yöntemi</label>
        <select name="paymentmethod">
            <option value="Electronic check" {% if musteri.paymentmethod == 'Electronic check' %}selected{% endif %}>Electronic check</option>
            <option value="Mailed check" {% if musteri.paymentmethod == 'Mailed check' %}selected{% endif %}>Mailed check</option>
            <option value="Bank transfer (automatic)" {% if musteri.paymentmethod == 'Bank transfer (automatic)' %}selected{% endif %}>Bank transfer (automatic)</option>
            <option value="Credit card (automatic)" {% if musteri.paymentmethod == 'Credit card (automatic)' %}selected{% endif %}>Credit card (automatic)</option>
        </select>

        <label>Destek Talebi Sayısı</label>
        <input type="number" name="supportticketcount" value="{{ musteri.supportticketcount }}" required>

        <button type="submit">Güncelle</button>
    </form>
</body>
</html>
